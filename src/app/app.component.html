<app-navbar [currentView]="currentView" (viewChange)="onViewChange($event)"></app-navbar>

<!-- Always render CardDisplayComponent so it can catch events and show modal over anything -->
<app-card-display></app-card-display>

<!-- Player Setup Modal -->
<app-player-setup></app-player-setup>

<main class="container" [class.full-width]="currentView === 'map'">
  
  @if (currentView === 'map') {
    <app-map-view></app-map-view>
  } @else {
    <!-- Management Area -->
    <div class="management-section">
      <app-card-form></app-card-form>
      <app-card-list></app-card-list>
    </div>
  }
  
</main>
